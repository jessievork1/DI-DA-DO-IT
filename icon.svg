<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1024" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="50%"  stop-color="#ff9500"/>
      <stop offset="100%" stop-color="#bf5fff"/>
    </linearGradient>
    <radialGradient id="orb1" cx="25%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="75%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="#08000f"/>

  <!-- Background orbs -->
  <rect width="1024" height="1024" rx="200" fill="url(#orb1)"/>
  <rect width="1024" height="1024" rx="200" fill="url(#orb2)"/>

  <!-- DI -->
  <text x="52" y="298"
        font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="310" font-weight="900" letter-spacing="-6"
        fill="url(#g)">DI</text>

  <!-- DA -->
  <text x="160" y="580"
        font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="310" font-weight="900" letter-spacing="-6"
        fill="url(#g)">DA</text>

  <!-- DO -->
  <text x="52" y="862"
        font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="295" font-weight="900" letter-spacing="-6"
        fill="url(#g)">DO</text>

  <!-- IT -->
  <text x="548" y="848"
        font-family="-apple-system,'Segoe UI',system-ui,sans-serif"
        font-size="164" font-weight="900" letter-spacing="4"
        fill="rgba(255,255,255,0.7)">IT</text>
</svg>
