<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Di Da Do It!</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Di Da Do It" />
  <meta name="theme-color" content="#7b2fff" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --di: #00d4ff;
      --da: #ff9500;
      --do: #bf5fff;
      --correct: #00c87a;
      --pass: #ff3b5c;
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.12);
    }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: #08000f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated bg orbs ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: #7b2fff; top: -100px; left: -100px; animation-duration: 20s; }
    .orb2 { width: 400px; height: 400px; background: #00c8ff; bottom: -80px; right: -80px; animation-duration: 16s; animation-delay: -5s; }
    .orb3 { width: 300px; height: 300px; background: #ff4d8b; top: 40%; left: 30%; animation-duration: 22s; animation-delay: -10s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 40px) scale(1.15); }
    }

    /* ── Splash screen — hidden by default, shown via JS only in PWA ── */
    #splash {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #08000f;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 32px 56px;
    }
    #splash.active  { display: flex; }
    #splash.fadeout { animation: splashOut 0.8s ease-in forwards; }
    #splash.hidden  { display: none !important; }

    @keyframes splashOut {
      to { opacity: 0; pointer-events: none; }
    }

    /* Publisher top */
    .splash-publisher {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      opacity: 0;
      animation: splashFadeUp 0.6s ease-out 0.3s forwards;
    }
    .splash-jv-text {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #00d4ff, #bf5fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .splash-games-text {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    /* Center logo + bloom */
    .splash-center {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .splash-bloom {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,47,255,0.35) 0%, rgba(0,212,255,0.12) 45%, transparent 70%);
      filter: blur(24px);
      animation: bloomPulse 3s ease-in-out infinite alternate;
    }
    @keyframes bloomPulse {
      from { transform: scale(0.88); opacity: 0.7; }
      to   { transform: scale(1.12); opacity: 1; }
    }
    .splash-logo {
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: splashFadeUp 0.7s ease-out 0.1s forwards;
    }

    @keyframes splashFadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Loading bar bottom */
    .splash-bottom {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: splashFadeUp 0.6s ease-out 0.5s forwards;
    }
    .splash-loading-track {
      width: 100%;
      max-width: 320px;
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .splash-loading-fill {
      height: 100%;
      width: 0%;
      border-radius: 6px;
      background: linear-gradient(90deg, #00d4ff, #7b2fff, #ff9500);
      box-shadow: 0 0 12px rgba(123,47,255,0.8), 0 0 24px rgba(0,212,255,0.4);
      animation: loadFill 9s ease-in-out forwards;
      position: relative;
    }
    .splash-loading-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 40px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5));
      border-radius: 0 6px 6px 0;
    }
    @keyframes loadFill {
      0%   { width: 0%; }
      60%  { width: 80%; }
      85%  { width: 93%; }
      100% { width: 100%; }
    }
    .splash-loading-label {
      font-size: 0.62rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }

    /* ── Canvas for confetti ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* ── Screens ── */
    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 40px;
    }

    .screen { width: 100%; display: flex; flex-direction: column; align-items: center; }
    .screen.hidden { display: none; }

    /* ── Logo sparkle twinkle ── */
    .logo-spark   { animation: twinkleSpark 2s   ease-in-out infinite alternate; }
    .logo-spark-2 { animation: twinkleSpark 1.6s ease-in-out infinite alternate; animation-delay: -0.6s; }
    .logo-spark-3 { animation: twinkleSpark 2.3s ease-in-out infinite alternate; animation-delay: -1.2s; }

    @keyframes twinkleSpark {
      from { opacity: 0.3; }
      to   { opacity: 1;   }
    }

    /* ── Logo ── */
    .logo {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--di), var(--da), var(--do), var(--di));
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      line-height: 1.1;
      text-align: center;
    }
    .logo-sub {
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-top: 6px;
    }

    @keyframes shimmer {
      0%   { background-position: 0%; }
      100% { background-position: 300%; }
    }

    /* ── Install button ── */
    #btn-install {
      display: none;
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }
    #btn-install:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Home screen ── */
    .home-section {
      width: 100%;
      margin-top: 36px;
    }
    .home-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 12px;
      text-align: center;
    }

    /* ── Team selector ── */
    .team-selector {
      display: flex;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
      width: 100%;
      justify-content: center;
    }
    .team-btn {
      flex: 1;
      padding: 11px 12px;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 46px;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.45);
      transition: all 0.25s;
      letter-spacing: 1px;
    }
    .team-btn.active {
      background: linear-gradient(135deg, #7b2fff, #bf5fff);
      color: #fff;
      box-shadow: 0 4px 20px rgba(123,47,255,0.5);
    }
    .example-btn.active {
      background: linear-gradient(135deg, #1a6b4a, #00c87a);
      box-shadow: 0 4px 20px rgba(0,200,122,0.4);
    }

    /* ── Duration selector ── */
    .dur-selector {
      display: flex;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
      width: 100%;
    }
    .dur-btn {
      flex: 1;
      padding: 11px 12px;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 46px;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.45);
      transition: all 0.25s;
      letter-spacing: 1px;
      text-align: center;
    }
    .dur-btn.active {
      background: linear-gradient(135deg, #0a4a6b, #00a8cc);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,168,204,0.45);
    }

    /* ── Buttons ── */
    .btn-start {
      width: 100%;
      padding: 20px;
      font-size: 1.15rem;
      font-weight: 800;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #7b2fff, #bf5fff);
      color: #fff;
      box-shadow: 0 10px 40px rgba(123,47,255,0.5);
      transition: transform 0.12s, opacity 0.2s;
      position: relative;
      overflow: hidden;
      margin-top: 36px;
    }
    .btn-start::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .btn-start:hover::after { opacity: 1; }
    .btn-start:active { transform: scale(0.97); }

    /* ── Game screen top bar ── */
    .game-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 16px;
    }
    .btn-home {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
      border-radius: 12px;
      padding: 8px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-home:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .team-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ── Circular Timer ── */
    .timer-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin-bottom: 20px;
    }
    .timer-svg {
      transform: rotate(-90deg);
      width: 130px;
      height: 130px;
    }
    .timer-track {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 8;
    }
    .timer-ring {
      fill: none;
      stroke: var(--di);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 345;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.9s linear, stroke 0.4s;
    }
    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      transition: color 0.4s;
    }
    .timer-wrap.warning .timer-ring { stroke: var(--da); }
    .timer-wrap.danger  .timer-ring { stroke: var(--pass); }
    .timer-wrap.warning .timer-text { color: var(--da); }
    .timer-wrap.danger  .timer-text { color: var(--pass); animation: pulse 0.5s ease-in-out infinite alternate; }

    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }

    /* ── Score pills ── */
    .scoreboard {
      display: flex;
      gap: 14px;
      margin-bottom: 22px;
    }
    .score-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid;
    }
    .score-pill.correct-pill {
      background: rgba(0,200,122,0.12);
      border-color: rgba(0,200,122,0.3);
      color: var(--correct);
    }
    .score-pill.pass-pill {
      background: rgba(255,59,92,0.12);
      border-color: rgba(255,59,92,0.3);
      color: var(--pass);
    }
    .score-pill .num {
      font-size: 1.3rem;
      font-weight: 900;
    }

    /* ── Song Card ── */
    .card-wrap {
      width: 100%;
      perspective: 1000px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 40px 28px 36px;
      text-align: center;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }
    .card.slide-out { animation: slideOut 0.2s ease-in forwards; }
    .card.slide-in  { animation: slideIn  0.25s ease-out forwards; }
    @keyframes slideOut {
      to { transform: translateX(-60px); opacity: 0; }
    }
    @keyframes slideIn {
      from { transform: translateX(60px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .card.flash-correct { animation: flashGreen 0.35s ease-out; }
    .card.flash-pass    { animation: flashRed   0.35s ease-out; }
    @keyframes flashGreen {
      0%   { box-shadow: 0 0 0 0 rgba(0,200,122,0.0); }
      40%  { box-shadow: 0 0 0 14px rgba(0,200,122,0.45); }
      100% { box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    }
    @keyframes flashRed {
      0%   { box-shadow: 0 0 0 0 rgba(255,59,92,0.0); }
      40%  { box-shadow: 0 0 0 14px rgba(255,59,92,0.45); }
      100% { box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    }

    .syllable {
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: 8px;
      line-height: 1;
      text-shadow: 0 0 40px currentColor, 0 0 80px currentColor;
      animation: glowPop 0.4s ease-out;
    }
    .syllable.DI { color: var(--di); }
    .syllable.DA { color: var(--da); }
    .syllable.DO { color: var(--do); }

    @keyframes glowPop {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .divider {
      width: 40px;
      height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }
    .song-title  { font-size: 1.55rem; font-weight: 800; color: #fff; line-height: 1.25; }
    .song-artist { font-size: 1rem; color: rgba(255,255,255,0.5); font-weight: 500; }
    .card-placeholder { color: rgba(255,255,255,0.25); font-size: 1rem; letter-spacing: 1px; }

    /* ── Action buttons ── */
    .action-buttons {
      display: flex;
      gap: 14px;
      width: 100%;
      margin-bottom: 0;
    }
    .btn-action {
      flex: 1;
      padding: 20px;
      font-size: 1.05rem;
      font-weight: 800;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-action::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .btn-action:hover:not(:disabled)::after { opacity: 1; }
    .btn-action:active:not(:disabled) { transform: scale(0.95); }
    .btn-action:disabled { opacity: 0.3; cursor: default; }

    .btn-correct {
      background: linear-gradient(135deg, #00a86b, #00e68a);
      color: #fff;
      box-shadow: 0 8px 30px rgba(0,200,122,0.35);
    }
    .btn-pass {
      background: linear-gradient(135deg, #cc1f3e, #ff3b5c);
      color: #fff;
      box-shadow: 0 8px 30px rgba(255,59,92,0.35);
    }

    /* ── Progress ── */
    .progress-bar-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      margin-top: 18px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7b2fff, #bf5fff);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ── Done card ── */
    .done-icon  { font-size: 3.5rem; margin-bottom: 4px; }
    .done-title { font-size: 1.6rem; font-weight: 900; color: #fff; }
    .done-sub   { font-size: 0.95rem; color: rgba(255,255,255,0.45); margin-top: 4px; }

    /* ── Summary overlay ── */
    #summary-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(8,0,15,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }
    #summary-overlay.show {
      display: flex;
      animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .summary-header {
      width: 100%;
      max-width: 480px;
      padding: 48px 24px 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .summary-header::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #7b2fff, #bf5fff);
      border-radius: 3px;
      margin: 16px auto 0;
    }
    .summary-icon  { font-size: 3rem; line-height: 1; margin-bottom: 8px; }
    .summary-title { font-size: 1.8rem; font-weight: 900; color: #fff; }
    .summary-pills { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }

    .summary-list {
      width: 100%;
      max-width: 480px;
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 8px;
      -webkit-overflow-scrolling: touch;
    }
    .summary-list::-webkit-scrollbar { width: 3px; }
    .summary-list::-webkit-scrollbar-track { background: transparent; }
    .summary-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-radius: 14px;
      margin-bottom: 8px;
      border: 1px solid;
      opacity: 0;
      animation: rowIn 0.35s ease-out forwards;
    }
    .summary-row.correct-row { background: rgba(0,200,122,0.07);  border-color: rgba(0,200,122,0.2); }
    .summary-row.pass-row    { background: rgba(255,59,92,0.07);  border-color: rgba(255,59,92,0.15); }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .summary-badge {
      font-size: 0.7rem;
      font-weight: 900;
      padding: 5px 9px;
      border-radius: 8px;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    .summary-badge.DI { background: rgba(0,212,255,0.15);  color: var(--di); }
    .summary-badge.DA { background: rgba(255,149,0,0.15);   color: var(--da); }
    .summary-badge.DO { background: rgba(191,95,255,0.15);  color: var(--do); }

    .summary-info   { flex: 1; min-width: 0; text-align: left; }
    .summary-song   { font-size: 0.95rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .summary-artist { font-size: 0.78rem; color: rgba(255,255,255,0.38); margin-top: 1px; }

    .summary-result         { font-size: 1.1rem; flex-shrink: 0; }
    .summary-result.correct { color: var(--correct); }
    .summary-result.pass    { color: var(--pass); }

    .summary-footer {
      width: 100%;

    /* ── Countdown overlay ── */
    #countdown-overlay {
      display: none;

      80%  { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0.7); opacity: 0; }
    }
  </style>
</head>

  <script>
    // ─────────────────────────────────────────────
    // SONG LISTS
    // ─────────────────────────────────────────────

    const EXAMPLE = [

      { song: "See you Again", artist: "Charlie Puth", type: "DI" },
      { song: "Zij gelooft in mij", artist: "Andre Hazes", type: "DO" },
    ];

    const TEAM2 = [
      { song: "Billie Jean", artist: "Michael Jackson", type: "DI" },
      { song: "Bad Guy", artist: "Billie Eilish", type: "DA" },
      { song: "Happy", artist: "Pharrell Williams", type: "DO" },

      { song: "Baby", artist: "Justin Bieber", type: "DO" },
      { song: "Brabant", artist: "Guus Meeuwis", type: "DI" },
      { song: "Als het avond is", artist: "Suzan & Freek", type: "DA" },
      { song: "One Kiss", artist: "Dua Lipa", type: "DI" },
      { song: "Watskebeurt", artist: "Jeugd van Tegenwoordig", type: "DO" },
      { song: "Oja Ole", artist: "K3", type: "DA" },
      { song: "Rosanne", artist: "Nick & Simon", type: "DI" },
      { song: "Potentie", artist: "Stefan & Sean, Bram Krikke", type: "DO" },
      { song: "Ik neem je mee", artist: "Gers Pardoel", type: "DI" },
      { song: "Gimme! Gimme! Gimme!", artist: "Abba", type: "DO" },
      { song: "Het Vrolijke Kosterlied", artist: "Johnny", type: "DA" },
      { song: "We will rock you", artist: "Queen", type: "DA" },
      { song: "Single Ladies", artist: "Beyonce", type: "DI" },
      { song: "Ice Ice Baby", artist: "Vanilla Ice", type: "DA" },
      { song: "Heb je even voor mij", artist: "Frans Bauer", type: "DO" },
      { song: "Umbrella", artist: "Jay-Z, Rihanna", type: "DA" },
      { song: "Kleine Jongen", artist: "Andre Hazes", type: "DA" },
      { song: "Levels", artist: "Avicii", type: "DI" },
      { song: "Pompeii", artist: "Bastille", type: "DI" },
    ];

    // ─────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────

    const CIRCUMFERENCE = 2 * Math.PI * 55;

    let currentTeam    = 1;
    let selectedDur    = 60;
    let totalTime      = 60;
    let queue          = [];
    let currentIndex   = 0;
    let score          = 0;
    let passCount      = 0;
    let gameActive     = false;
    let timeLeft       = 60;
    let timerInterval  = null;
    let results        = [];

    const ring = document.getElementById('timer-ring');
    ring.style.strokeDasharray = CIRCUMFERENCE;
    ring.style.strokeDashoffset = 0;

    // ─────────────────────────────────────────────
    // AUDIO (Web Audio API — no files needed)
    // ─────────────────────────────────────────────

    let audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playTone(freq, dur, type = 'sine', vol = 0.4, startDelay = 0) {
      const ctx = getAudio();
      const t   = ctx.currentTime + startDelay;
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t);
      osc.stop(t + dur + 0.05);
    }

    function soundCountdown(n) {
      if (n > 0) {
        // All three lights: identical short beep, like F1
        playTone(880, 0.12, 'sine', 0.55);
      } else {
        // Lights out — GO! Rising two-tone burst
        playTone(880, 0.08, 'sine', 0.5,  0);
        playTone(1320, 0.4, 'sine', 0.55, 0.07);
      }
    }

    function soundCorrect() {
      // Ascending bling: C5 → G5 → C6
      playTone(523,  0.08, 'sine', 0.35, 0);
      playTone(784,  0.12, 'sine', 0.35, 0.08);
      playTone(1047, 0.3,  'sine', 0.28, 0.18);
    }

    function soundPass() {
      // Descending buzzer: sawtooth drop
      const ctx  = getAudio();
      const t    = ctx.currentTime;
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(280, t);
      osc.frequency.exponentialRampToValueAtTime(70, t + 0.45);
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t);
      osc.stop(t + 0.5);
    }

    function soundTick(intense) {
      // Sharp clock tick — noticeable but not annoying
      playTone(intense ? 1200 : 900, 0.05, 'triangle', intense ? 0.55 : 0.35);
    }

    function soundTimeUp() {
      // Basketball game-end buzzer — harsh, sustained, loud
      const ctx = getAudio();
      const t   = ctx.currentTime;

      // Layer 1: main square buzz
      const osc1  = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.connect(gain1); gain1.connect(ctx.destination);
      osc1.type = 'square';
      osc1.frequency.setValueAtTime(160, t);
      osc1.frequency.setValueAtTime(152, t + 0.05);
      osc1.frequency.setValueAtTime(160, t + 0.1);
      osc1.frequency.setValueAtTime(155, t + 0.15);
      gain1.gain.setValueAtTime(0.45, t);
      gain1.gain.setValueAtTime(0.45, t + 0.9);
      gain1.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
      osc1.start(t); osc1.stop(t + 1.15);

      // Layer 2: gritty overtone for extra harshness
      const osc2  = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.type = 'sawtooth';
      osc2.frequency.setValueAtTime(320, t);
      gain2.gain.setValueAtTime(0.2, t);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
      osc2.start(t); osc2.stop(t + 1.05);
    }

    // ─────────────────────────────────────────────
    // NAVIGATION
    // ─────────────────────────────────────────────

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function goHome() {
      clearInterval(timerInterval);
      gameActive = false;
      document.getElementById('summary-overlay').classList.remove('show');
      showScreen('home-screen');
    }

    // ─────────────────────────────────────────────
    // HOME SCREEN CONTROLS
    // ─────────────────────────────────────────────

    function selectTeam(n) {
      currentTeam = n;
      document.getElementById('btn-example').classList.toggle('active', n === 0);
      document.getElementById('btn-team1').classList.toggle('active', n === 1);
      document.getElementById('btn-team2').classList.toggle('active', n === 2);
    }

    function selectDuration(btn) {
      document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDur = parseInt(btn.dataset.time);
    }

    // ─────────────────────────────────────────────
    // GAME LOGIC
    // ─────────────────────────────────────────────

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startGame() {
      const list = currentTeam === 0 ? EXAMPLE : currentTeam === 1 ? TEAM1 : TEAM2;
      if (!list.length) { alert('No songs yet!'); return; }

      // Init audio on first user gesture
      getAudio();

      totalTime    = selectedDur;
      queue        = shuffle(list);
      currentIndex = 0;
      score        = 0;
      passCount    = 0;
      results      = [];
      timeLeft     = totalTime;

      const teamNames = { 0: 'Example', 1: 'Team 1', 2: 'Team 2' };
      document.getElementById('team-badge').textContent = teamNames[currentTeam];

      showScreen('game-screen');
      updateScoreboard();
      updateTimer();

      document.getElementById('card').innerHTML = '<p class="card-placeholder">Get ready…</p>';
      document.getElementById('btn-correct').disabled = true;
      document.getElementById('btn-pass').disabled = true;
      document.getElementById('progress-wrap').style.display = 'none';
      document.getElementById('progress-label').textContent = '';

      runCountdown(3, () => {
        gameActive = true;
        document.getElementById('btn-correct').disabled = false;
        document.getElementById('btn-pass').disabled = false;
        document.getElementById('progress-wrap').style.display = 'block';
        showCard(false);
        timerInterval = setInterval(tick, 1000);
      });
    }

    function runCountdown(n, done) {
      const overlay = document.getElementById('countdown-overlay');
      const num     = document.getElementById('countdown-num');

      if (n === 0) {
        soundCountdown(0);
        overlay.classList.remove('show');
        done();
        return;
      }

      soundCountdown(n);
      overlay.classList.add('show');
      num.textContent = n;
      num.style.animation = 'none';
      num.offsetHeight;
      num.style.animation = '';

      setTimeout(() => runCountdown(n - 1, done), 900);
    }

    function tick() {
      timeLeft--;
      updateTimer();

      const intense = timeLeft <= 10;
      const ticking = timeLeft <= 20;
      if (ticking) soundTick(intense);

      if (timeLeft <= 0) { soundTimeUp(); endGame('time'); }
    }

    function updateTimer() {
      const wrap = document.getElementById('timer-wrap');
      const text = document.getElementById('timer-text');
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      text.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

      const offset = CIRCUMFERENCE * (1 - Math.max(timeLeft, 0) / totalTime);
      ring.style.strokeDashoffset = offset;

      wrap.className = 'timer-wrap ' + (timeLeft > 20 ? 'normal' : timeLeft > 10 ? 'warning' : 'danger');
    }

    function showCard(animate = true) {
      const card  = document.getElementById('card');
      const total = queue.length;

      if (currentIndex >= total) { endGame('done'); return; }

      const entry = queue[currentIndex];

      const render = () => {
        card.innerHTML = `
          <div class="syllable ${entry.type}">${entry.type}</div>
          <div class="divider"></div>
          <div class="song-title">${entry.song}</div>
          <div class="song-artist">${entry.artist}</div>
        `;
        if (animate) {
          card.classList.remove('slide-in');
          void card.offsetWidth;
          card.classList.add('slide-in');
        }
        const pct = ((currentIndex + 1) / total * 100).toFixed(1);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-label').textContent = `Song ${currentIndex + 1} of ${total}`;
      };

      if (animate) {
        card.classList.add('slide-out');
        setTimeout(() => { card.classList.remove('slide-out'); render(); }, 180);
      } else {
        render();
      }
    }

    function correct() {
      if (!gameActive) return;
      results.push({ ...queue[currentIndex], result: 'correct' });
      score++;
      currentIndex++;
      updateScoreboard();
      flashCard('correct');
      soundCorrect();
      launchConfetti();
      setTimeout(() => showCard(true), 120);
    }

    function pass() {
      if (!gameActive) return;
      results.push({ ...queue[currentIndex], result: 'pass' });
      passCount++;
      currentIndex++;
      updateScoreboard();
      flashCard('pass');
      soundPass();
      setTimeout(() => showCard(true), 120);
    }

    function flashCard(type) {
      const card = document.getElementById('card');
      card.classList.remove('flash-correct', 'flash-pass');
      void card.offsetWidth;
      card.classList.add(type === 'correct' ? 'flash-correct' : 'flash-pass');
    }

    function endGame(reason) {
      clearInterval(timerInterval);
      gameActive = false;

      document.getElementById('btn-correct').disabled = true;
      document.getElementById('btn-pass').disabled = true;
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-label').textContent = '';

      const isTime = reason === 'time';
      const teamLabel = currentTeam === 0 ? 'Example' : `Team ${currentTeam}`;

      document.getElementById('summary-icon').textContent  = isTime ? '⏰' : '🎉';
      document.getElementById('summary-title').textContent = isTime ? "Time's up!" : "All done!";
      document.getElementById('summary-pills').innerHTML   = `
        <div class="score-pill correct-pill">✔ Correct <span class="num">${score}</span></div>
        <div class="score-pill pass-pill">✖ Pass <span class="num">${passCount}</span></div>
      `;

      const list = document.getElementById('summary-list');
      list.innerHTML = results.map((r, i) => `
        <div class="summary-row ${r.result}-row" style="animation-delay:${i * 45}ms">
          <span class="summary-badge ${r.type}">${r.type}</span>
          <div class="summary-info">
            <div class="summary-song">${r.song}</div>
            <div class="summary-artist">${r.artist}</div>
          </div>
          <span class="summary-result ${r.result}">${r.result === 'correct' ? '✔' : '✖'}</span>
        </div>
      `).join('');

      document.getElementById('summary-overlay').classList.add('show');

      if (!isTime || score > 0) launchConfetti();
    }

    function updateScoreboard() {
      document.getElementById('score').textContent  = score;
      document.getElementById('passes').textContent = passCount;
    }

    // ─────────────────────────────────────────────
    // CONFETTI
    // ─────────────────────────────────────────────

    const confettiCanvas = document.getElementById('confetti-canvas');
    const ctx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnim = null;

    function resizeCanvas() {
      confettiCanvas.width  = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function launchConfetti() {
      const colors = ['#00d4ff','#ff9500','#bf5fff','#00e68a','#ff3b5c','#fff'];
      for (let i = 0; i < 80; i++) {
        confettiParticles.push({
          x: Math.random() * confettiCanvas.width,
          y: -10,
          r: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          vy: Math.random() * 4 + 2,
          vx: (Math.random() - 0.5) * 4,
          spin: Math.random() * 0.2 - 0.1,
          angle: Math.random() * Math.PI * 2,
          alpha: 1,
        });
      }
      if (!confettiAnim) animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      confettiParticles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
        ctx.restore();
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.angle += p.spin;
        if (p.y > confettiCanvas.height * 0.7) p.alpha -= 0.03;
      });
      confettiParticles = confettiParticles.filter(p => p.alpha > 0);
      if (confettiParticles.length) {
        confettiAnim = requestAnimationFrame(animateConfetti);
      } else {
        confettiAnim = null;
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }
  </script>

  <script>
    // ── PWA Install prompt ──
    let deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      document.getElementById('btn-install').style.display = 'block';
    });

    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      document.getElementById('btn-install').style.display = 'none';
    });

    function installApp() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      deferredInstallPrompt.userChoice.then(() => {
        deferredInstallPrompt = null;
        document.getElementById('btn-install').style.display = 'none';
      });
    }

    // Show splash ONLY when running as installed PWA (not in browser)
    const isPWA = window.matchMedia('(display-mode: standalone)').matches
               || window.navigator.standalone === true;

    if (isPWA) {
      const splash = document.getElementById('splash');
      splash.classList.add('active');
      // Fade out after 9.2s, remove after 10s
      setTimeout(() => splash.classList.add('fadeout'), 9200);
      setTimeout(() => splash.classList.add('hidden'),  10000);
    }

    // Register service worker for offline / PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
